<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Fondo noche degradado -->
  <defs>
    <radialGradient id="sky" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#6EC6FF"/>
      <stop offset="60%" stop-color="#2D3A4A"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- HUD barra amarilla -->
  <rect x="0" y="0" width="800" height="50" fill="#FFD90F"/>
  <text x="20" y="32" font-family="Trebuchet MS, Arial" font-size="20" font-weight="bold" fill="#1C3F94">BART vs BOB PATIÑO</text>
  <text x="540" y="22" font-family="Trebuchet MS, Arial" font-size="15" font-weight="bold" fill="#000">Puntos: 240</text>
  <text x="540" y="42" font-family="Trebuchet MS, Arial" font-size="15" font-weight="bold" fill="#000">Vidas: ♥♥♥</text>
  <text x="680" y="32" font-family="Trebuchet MS, Arial" font-size="15" font-weight="bold" fill="#000">Nivel: 2</text>

  <!-- Cielo azul área de juego -->
  <rect x="0" y="50" width="800" height="280" fill="#87CEEB"/>

  <!-- Nubes -->
  <g fill="white">
    <ellipse cx="120" cy="110" rx="40" ry="22"/>
    <ellipse cx="155" cy="118" rx="36" ry="18"/>
    <ellipse cx="88"  cy="118" rx="36" ry="18"/>
    <ellipse cx="120" cy="125" rx="44" ry="20"/>

    <ellipse cx="380" cy="95" rx="35" ry="20"/>
    <ellipse cx="412" cy="102" rx="30" ry="16"/>
    <ellipse cx="350" cy="102" rx="30" ry="16"/>
    <ellipse cx="380" cy="108" rx="38" ry="18"/>

    <ellipse cx="640" cy="115" rx="45" ry="24"/>
    <ellipse cx="680" cy="122" rx="38" ry="20"/>
    <ellipse cx="600" cy="122" rx="38" ry="20"/>
    <ellipse cx="640" cy="130" rx="48" ry="22"/>
  </g>

  <!-- Carretera -->
  <rect x="0" y="270" width="800" height="40" fill="#555"/>
  <line x1="0" y1="290" x2="800" y2="290" stroke="white" stroke-width="3" stroke-dasharray="20,14"/>

  <!-- Césped -->
  <rect x="0" y="310" width="800" height="90" fill="#4CAF50"/>

  <!-- Panel de controles -->
  <rect x="20" y="360" width="340" height="65" fill="rgba(0,0,0,0.55)" rx="6"/>
  <text x="32" y="380" font-family="Trebuchet MS, Arial" font-size="13" font-weight="bold" fill="#FFD90F">Controles:</text>
  <text x="32" y="398" font-family="Trebuchet MS, Arial" font-size="12" fill="white">Mover: WASD o Flechas</text>
  <text x="32" y="415" font-family="Trebuchet MS, Arial" font-size="12" fill="white">Disparo: ESPACIO | Recoge los círculos de colores</text>

  <!-- Jugador Bart (pixel art simple) -->
  <g transform="translate(370, 220)">
    <!-- cuerpo -->
    <rect x="0" y="10" width="28" height="22" fill="#FFD90F" rx="3"/>
    <!-- cabeza -->
    <rect x="2" y="-8" width="24" height="20" fill="#FFD90F" rx="4"/>
    <!-- pelo pinchos -->
    <polygon points="6,-8 8,-18 10,-8" fill="#FFD90F"/>
    <polygon points="11,-10 13,-20 15,-10" fill="#FFD90F"/>
    <polygon points="16,-8 18,-18 20,-8" fill="#FFD90F"/>
    <!-- ojos -->
    <circle cx="9" cy="-2" r="3" fill="white"/>
    <circle cx="19" cy="-2" r="3" fill="white"/>
    <circle cx="10" cy="-2" r="1.5" fill="#000"/>
    <circle cx="20" cy="-2" r="1.5" fill="#000"/>
    <!-- camisa roja -->
    <rect x="1" y="10" width="26" height="14" fill="#E74C3C" rx="2"/>
    <!-- pantalón -->
    <rect x="2" y="23" width="11" height="9" fill="#3498DB" rx="2"/>
    <rect x="15" y="23" width="11" height="9" fill="#3498DB" rx="2"/>
  </g>

  <!-- NPC Bob 1 -->
  <g transform="translate(160, 175)">
    <rect x="0" y="10" width="28" height="22" fill="#C0A882" rx="3"/>
    <rect x="2" y="-6" width="24" height="18" fill="#E8D5A3" rx="4"/>
    <!-- pelo afro -->
    <ellipse cx="14" cy="-10" rx="18" ry="16" fill="#8B4513"/>
    <circle cx="9" cy="-2" r="3" fill="white"/>
    <circle cx="19" cy="-2" r="3" fill="white"/>
    <circle cx="10" cy="-2" r="1.5" fill="#000"/>
    <circle cx="20" cy="-2" r="1.5" fill="#000"/>
    <rect x="1" y="10" width="26" height="14" fill="#2C3E50" rx="2"/>
    <rect x="2" y="23" width="11" height="9" fill="#2C3E50" rx="2"/>
    <rect x="15" y="23" width="11" height="9" fill="#2C3E50" rx="2"/>
  </g>

  <!-- NPC Bob 2 -->
  <g transform="translate(560, 195)">
    <rect x="0" y="10" width="28" height="22" fill="#C0A882" rx="3"/>
    <rect x="2" y="-6" width="24" height="18" fill="#E8D5A3" rx="4"/>
    <ellipse cx="14" cy="-10" rx="18" ry="16" fill="#8B4513"/>
    <circle cx="9" cy="-2" r="3" fill="white"/>
    <circle cx="19" cy="-2" r="3" fill="white"/>
    <circle cx="10" cy="-2" r="1.5" fill="#000"/>
    <circle cx="20" cy="-2" r="1.5" fill="#000"/>
    <rect x="1" y="10" width="26" height="14" fill="#2C3E50" rx="2"/>
    <rect x="2" y="23" width="11" height="9" fill="#2C3E50" rx="2"/>
    <rect x="15" y="23" width="11" height="9" fill="#2C3E50" rx="2"/>
  </g>

  <!-- Balas -->
  <rect x="330" y="234" width="8" height="8" fill="#FFD90F" rx="1"/>
  <rect x="300" y="234" width="8" height="8" fill="#FFD90F" rx="1"/>

  <!-- PowerUp vida -->
  <circle cx="490" cy="160" r="12" fill="#FF3B3B"/>
  <text x="490" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">+</text>

  <!-- PowerUp velocidad -->
  <circle cx="240" cy="280" r="12" fill="#00E676"/>
  <text x="240" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">S</text>

  <!-- Borde del canvas simulado -->
  <rect x="0" y="0" width="800" height="450" fill="none" stroke="#FFD90F" stroke-width="4" rx="10"/>
</svg>

