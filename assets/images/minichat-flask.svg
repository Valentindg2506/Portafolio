<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d6cdf"/>
      <stop offset="100%" style="stop-color:#1f57bb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Ventana del chat centrada -->
  <rect x="150" y="20" width="500" height="460" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Header del chat -->
  <rect x="150" y="20" width="500" height="60" rx="16" fill="url(#blue)"/>
  <rect x="150" y="56" width="500" height="24" fill="url(#blue)"/>
  <text x="400" y="58" font-family="sans-serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle">💬 Minichat</text>
  <!-- Formulario -->
  <rect x="170" y="92" width="460" height="80" rx="8" fill="#0f172a"/>
  <rect x="185" y="102" width="430" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="120" font-family="sans-serif" font-size="12" fill="#64748b">Tu nombre...</text>
  <rect x="185" y="136" width="360" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="154" font-family="sans-serif" font-size="12" fill="#64748b">Escribe un mensaje...</text>
  <rect x="553" y="136" width="62" height="28" rx="6" fill="url(#blue)"/>
  <text x="584" y="154" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Enviar</text>
  <!-- Mensajes -->
  <!-- Mensaje 1 -->
  <rect x="170" y="185" width="460" height="68" rx="10" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="190" y="205" font-family="sans-serif" font-size="12" fill="#2d6cdf" font-weight="bold">Valentín</text>
  <text x="450" y="205" font-family="sans-serif" font-size="11" fill="#64748b">14:23:07</text>
  <text x="190" y="225" font-family="sans-serif" font-size="13" fill="#f1f5f9">¡Hola a todos! ¿Cómo estáis? 👋</text>
  <text x="190" y="244" font-family="sans-serif" font-size="11" fill="#94a3b8">hace un momento</text>
  <!-- Mensaje 2 -->
  <rect x="170" y="265" width="460" height="68" rx="10" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="190" y="285" font-family="sans-serif" font-size="12" fill="#10b981" font-weight="bold">María</text>
  <text x="450" y="285" font-family="sans-serif" font-size="11" fill="#64748b">14:23:31</text>
  <text x="190" y="305" font-family="sans-serif" font-size="13" fill="#f1f5f9">Todo bien por aquí, ¡este chat mola!</text>
  <text x="190" y="324" font-family="sans-serif" font-size="11" fill="#94a3b8">hace un momento</text>
  <!-- Mensaje 3 -->
  <rect x="170" y="345" width="460" height="68" rx="10" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="190" y="365" font-family="sans-serif" font-size="12" fill="#f59e0b" font-weight="bold">Carlos</text>
  <text x="450" y="365" font-family="sans-serif" font-size="11" fill="#64748b">14:24:02</text>
  <text x="190" y="385" font-family="sans-serif" font-size="13" fill="#f1f5f9">Actualización cada 1 segundo con fetch() 🚀</text>
  <text x="190" y="404" font-family="sans-serif" font-size="11" fill="#94a3b8">hace un momento</text>
  <!-- Badge tecnología -->
  <rect x="155" y="430" width="490" height="36" rx="8" fill="rgba(45,108,223,0.1)" stroke="rgba(45,108,223,0.3)" stroke-width="1"/>
  <text x="400" y="452" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Python · Flask · Fetch API · REST JSON · Polling 1s</text>
  <!-- Indicador de actividad -->
  <circle cx="730" cy="60" r="8" fill="#10b981"/>
  <text x="750" y="65" font-family="sans-serif" font-size="11" fill="#10b981">Live</text>
</svg>

